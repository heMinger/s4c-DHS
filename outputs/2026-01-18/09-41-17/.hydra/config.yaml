    freq_factor: 1.5
    include_input: true
  encoder:
    type: monodepth2
    freeze: false
    pretrained: true
    resnet_layers: 50
    num_ch_dec:
    - 32
    - 32
    - 64
    - 128
    - 256
    d_out: 64
  mlp_coarse:
    type: resnet
    n_blocks: 0
    d_hidden: 64
  mlp_fine:
    type: empty
    n_blocks: 1
    d_hidden: 128
  mlp_segmentation:
    type: resnet
    n_blocks: 0
    d_hidden: 64
  z_near: 3
  z_far: 80
  inv_z: true
  n_frames_encoder: 1
  n_frames_render: 2
  frame_sample_mode: kitti360-mono
  sample_mode: patch
  patch_size: 8
  ray_batch_size: 4096
  flip_augmentation: true
  learn_empty: false
  code_mode: z
loss:
  criterion: l1+ssim
  invalid_policy: weight_guided
  lambda_edge_aware_smoothness: 0.001
  lambda_segmentation: 0.02
  lambda_density_entropy: 0
