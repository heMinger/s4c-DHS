# 消融实验: 关闭自适应采样，使用均匀采样
# 对比: DA3 自适应采样 vs 传统均匀采样

defaults:
    - default
    - data: kitti_360
    - _self_

name: "ablation_uniform_sampling"
model: "bts"
output_path: "out/kitti_360/ablation_uniform"

num_epochs: 60
batch_size: 4

use_backbone: false
segmentation_mode: 'panoptic_deeplab'

save_best:
    metrics:
        - metric: a1_lidar
          sign: 1
        - metric: seg_acc
          sign: 1

model_conf:
    arch: "BTSNet"
    use_code: true
    prediction_mode: default

    code:
        num_freqs: 6
        freq_factor: 1.5
        include_input: true

    encoder:
        type: "monodepth2"
        freeze: false
        pretrained: true
        resnet_layers: 50
        num_ch_dec: [32,32,64,128,256]
        d_out: 64

    # ========== 消融: 关闭自适应采样 ==========
    adaptive_sampling: false  # ← 关闭！
    # n_surface_samples: 32  # 不使用
    # n_global_samples: 32   # 不使用
    
    mlp_coarse:
        type : "resnet"
        n_blocks : 0
        d_hidden : 64

    mlp_fine:
        type : "empty"
        n_blocks : 1
        d_hidden : 128

    mlp_segmentation:
        type: "resnet"
        n_blocks: 0
        d_hidden: 64

    z_near: 3
    z_far: 80
    inv_z: true

    n_frames_encoder: 1
    n_frames_render: 2
    frame_sample_mode: kitti360-mono

    sample_mode: patch
    patch_size: 8
    ray_batch_size: 4096

    flip_augmentation: true
    learn_empty: false
    code_mode: z

loss:
    criterion: "l1+ssim"
    invalid_policy: weight_guided
    lambda_edge_aware_smoothness: 0.001
    lambda_segmentation: 0.02
    lambda_density_entropy: 0
    segmentation_class_weights:
        0: 1
        1: 10
        2: 1
        3: 1
        4: 1
        5: 10
        6: 5
        7: 10
        8: 1
        9: 1
        10: 1
        11: 5
        12: 1
        13: 1
        14: 1
        15: 1
        16: 1
        17: 1
        18: 1

scheduler:
    type: step
    step_size: 120000
    gamma: 0.1

renderer:
    n_coarse: 64  # ← 与自适应采样相同的总点数
    n_fine: 0
    n_fine_depth: 0
    depth_std: 1.0
    sched: []
    white_bkgd: false
    lindisp: true
    hard_alpha_cap: true
    eval_batch_size: 200000
